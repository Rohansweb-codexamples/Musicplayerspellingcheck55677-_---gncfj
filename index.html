<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Simple Music Player</title>

<style>
  body {
    background: #111;
    color: white;
    font-family: Arial, sans-serif;
    text-align: center;
    padding: 20px;
  }

  audio {
    width: 100%;
    margin-top: 20px;
  }

  .btn {
    width: 100%;
    padding: 30px;
    margin: 15px 0;
    font-size: 32px;
    font-weight: bold;
    border: none;
    border-radius: 12px;
    background: #444;
    color: white;
    cursor: pointer;
  }

  .btn:active {
    background: #666;
  }
</style>

</head>
<body>

<h1>Music Player</h1>

<audio id="player" controls></audio>

<button class="btn" onclick="playTrack(1)">TRACK 1</button>
<button class="btn" onclick="playTrack(2)">TRACK 2</button>
<button class="btn" onclick="playTrack(3)">TRACK 3</button>
<button class="btn" onclick="playTrack(4)">TRACK 4</button>
<button class="btn" onclick="playTrack(5)">TRACK 5</button>

<script>
const BASE = "https://rohansweb-codexamples.github.io/Musicplayerspellingcheck55677-_---gncfj/";

const tracks = {
  1: "SONGSmashup-aimashupmaker-1778513456891900046.mp3",
  2: "screenrecorder-20260511-161025.mp3",
  3: "Rapture%20Original%20Extended%20Mix%20feat%20Nadia%20Ali.mp3",
  4: "Neon_Dreams_Accelerate%20(Extended).mp3",
  5: "16.1s%20Recording%20(Dec%2028%20@%2012_05%20PM)%20(Cover).mp3"
};

function playTrack(n) {
  const player = document.getElementById("player");
  player.src = BASE + tracks[n];
  player.play();
}
</script>

</body>
</html>
