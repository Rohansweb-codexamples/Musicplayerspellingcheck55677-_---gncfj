<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Music Player</title>

<style>
  body {
    background: #000;
    color: white;
    font-family: Arial, sans-serif;
    text-align: center;
    padding: 10px;
  }

  img {
    width: 220px;
    height: 220px;
    border-radius: 12px;
    object-fit: cover;
    margin-bottom: 15px;
  }

  audio {
    width: 100%;
    margin-bottom: 20px;
  }

  .btn {
    width: 100%;
    padding: 22px;
    margin: 10px 0;
    font-size: 28px;
    font-weight: bold;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    color: white;
  }

  .red { background: #b30000; }
  .blue { background: #0044cc; }
  .green { background: #008f39; }

  .btn:active {
    opacity: 0.7;
  }
</style>

</head>
<body>

<h1>Music Player</h1>

<!-- Album Art -->
<img id="art" src="https://rohansweb-codexamples.github.io/Musicplayerspellingcheck55677-_---gncfj/ai-logo-498cbab10ff6-standard.png" alt="Album Art">

<!-- Audio Player -->
<audio id="player" controls></audio>

<!-- Buttons -->
<button class="btn red" onclick="playTrack(1)">TRACK 1</button>
<button class="btn blue" onclick="playTrack(2)">TRACK 2</button>
<button class="btn green" onclick="playTrack(4)">TRACK 4</button>

<script>
const BASE = "https://rohansweb-codexamples.github.io/Musicplayerspellingcheck55677-_---gncfj/";

const tracks = {
  1: {
    file: "mashup-aimashupmaker-1778513456891900046.mp3",
    art: "https://rohansweb-codexamples.github.io/Musicplayerspellingcheck55677-_---gncfj/ai-logo-498cbab10ff6-standard.png"
  },
  2: {
    file: "screenrecorder-20260511-161025.mp3",
    art: "https://via.placeholder.com/220/4444ff/ffffff?text=Track+2"
  },
  4: {
    file: "Neon_Dreams_Accelerate%20(Extended).mp3",
    art: "https://via.placeholder.com/220/22aa55/ffffff?text=Track+4"
  }
};

function playTrack(n) {
  const player = document.getElementById("player");
  const art = document.getElementById("art");

  player.src = BASE + tracks[n].file;
  art.src = tracks[n].art;

  player.play();
}
</script>

</body>
</html>
